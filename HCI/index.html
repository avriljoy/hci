<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & QR Info</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="app">
    <!-- Login Form -->
    <div id="loginForm">
      <h2>Login / Signup</h2>
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button onclick="login()">Login</button>
    </div>

    <!-- Info Form -->
    <div id="infoForm" style="display:none;">
      <h2>Your Information</h2>
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="text" id="age" placeholder="Age" required>
      <input type="text" id="address" placeholder="Address" required>
      <input type="text" id="emergency" placeholder="Emergency Contact Person" required>
      <input type="text" id="phone" placeholder="Emergency Contact Phone Number" required>
      <input type="text" id="facebook" placeholder="Facebook Profile (optional)">
      <button onclick="generateQR()">Generate QR Code</button>
    </div>

    <!-- QR Code Display -->
    <div id="qrSection" style="display:none;">
      <h2 class="emergency-title">FOR EMERGENCY</h2>
      <div id="qrcode"></div>
      <button onclick="downloadQR()">Download QR Code</button>
    </div>
  </div>

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
